<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Barangay New Cabalan Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>🏛️ Barangay New Cabalan</h1>
                <p>Document Request Portal</p>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="tracking.html">Track Request</a>
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="profile.html">Profile</a>
                <a href="#" onclick="logout(); return false;">Logout</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container dashboard">
            <div class="dashboard-header">
                <h2>My Requests</h2>
                <a href="request-form.html" class="btn btn-primary">New Request</a>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>0</h3>
                    <p>Total Requests</p>
                </div>
                <div class="stat-card">
                    <h3>0</h3>
                    <p>Pending</p>
                </div>
                <div class="stat-card">
                    <h3>0</h3>
                    <p>Processing</p>
                </div>
                <div class="stat-card">
                    <h3>0</h3>
                    <p>Ready</p>
                </div>
            </div>

            <div class="requests-list"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Barangay New Cabalan. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
