<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Request - Barangay New Cabalan Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>🏛️ Barangay New Cabalan</h1>
                <p>Document Request Portal</p>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="tracking.html" class="active">Track Request</a>
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
                <a href="help.html">Help</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tracking-form">
                <div class="form-container">
                    <h2>Track Your Request</h2>
                    <p style="text-align: center; color: var(--text-light); margin-bottom: 1.5rem;">
                        Enter your tracking number to check the status of your request
                    </p>
                    <form id="tracking-form">
                        <div class="form-group">
                            <label for="tracking-number">Tracking Number</label>
                            <input type="text" id="tracking-number" name="trackingNumber" 
                                   placeholder="BRG-2026-XXXXXX" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Track Request</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="tracking-result"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Barangay New Cabalan. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
